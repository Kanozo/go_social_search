[browser]
; Tipo de navegador para fingerprint: firefox | chromium
; Con Camoufox, esto solo afecta la selección de User-Agent en el fingerprint.
; Camoufox siempre usa Firefox modificado internamente.
type = firefox

; Comportamiento de visibilidad
; true  = arranca invisible (más rápido e indetectable)
; false = arranca con ventana visible desde el inicio
headless_default = false

; Mostrar ventana al detectar CAPTCHA para resolución manual
visible_on_captcha = true

; Segundos máximos para resolver el CAPTCHA (0 = esperar indefinidamente)
captcha_manual_timeout = 300

; Volver a headless tras resolver el CAPTCHA
; false = mantener visible (útil si hay CAPTCHAs frecuentes)
headless_after_captcha = false

[camoufox]
; ── Configuración específica de Camoufox ──

; Activar humanización nativa de Camoufox (movimientos de ratón, delays, etc.)
; true = Camoufox aplica su propia lógica de humanización
; false = solo se usa el stealth JS personalizado
humanize = true

; Activar GeoIP para coherencia de timezone/locale con la IP del proxy
; true = Camoufox ajusta timezone/locale según la IP de salida
; false = usa los valores del fingerprint
geoip = false

; Delay entre lanzamientos de browsers (segundos) para evitar picos de memoria
; Recomendado: 2-5 segundos con múltiples browsers
launch_delay = 3.0

[concurrency]
; Browsers activos simultáneos — ajustar según RAM/CPU/ancho de banda
; Con Camoufox: cada instancia consume ~1.5-2GB RAM
; Recomendado: 2 para 8GB RAM, 4 para 16GB+ RAM
max_browsers = 1

[scraping]
cycle_delay_seconds = 3600
total_pages_per_keyword = 3

[session]
; Persistir cookies y localStorage entre ciclos
persist = true

[logging]
level = INFO
file = app.log
audit_file = audit.log
; Tamaño máximo del fichero de log antes de rotar (bytes): 10 MB
max_bytes = 10485760
backup_count = 3