[output]
; Destino de los resultados: sqlite | api
mode = sqlite

[api]
data_store_base_url = https://notires.rem.cu/api
data_store_token = 42|htoFv3uJ8ZIJMuWoSDQkmLOK0vnv5GSoGbQaKDWBf2cb6b41
; false para APIs internas sin certificado válido
data_store_verify_ssl = false

[browser]
; Tipo de navegador: firefox | chromium
type = firefox

; Comportamiento de visibilidad
; true  = arranca invisible (más rápido e indetectable)
; false = arranca con ventana visible desde el inicio
headless_default = true

; Mostrar ventana al detectar CAPTCHA para resolución manual
visible_on_captcha = true

; Segundos máximos para resolver el CAPTCHA (0 = esperar indefinidamente)
captcha_manual_timeout = 300

; Volver a headless tras resolver el CAPTCHA
; false = mantener visible (útil si hay CAPTCHAs frecuentes)
headless_after_captcha = false

[concurrency]
; Browsers activos simultáneos — ajustar según RAM/CPU/ancho de banda
max_browsers = 4

[scraping]
cycle_delay_seconds = 3600
total_pages_per_keyword = 3

[session]
; Persistir cookies y localStorage entre ciclos
persist = true

[logging]
level = INFO
file = app.log
audit_file = audit.log
; Tamaño máximo del fichero de log antes de rotar (bytes): 10 MB
max_bytes = 10485760
backup_count = 3